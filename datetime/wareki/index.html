<body class="page-tool tool-page">

    <header id="site-header" class="site-header--tool" data-header-partial="tool"></header>

    <div class="tool-chrome" data-tool-id="wareki">
        <div class="tool-panel convert-tool">
            <div class="convert-tabs" role="tablist" aria-label="変換の種類">
                <button type="button" class="convert-tab" role="tab" id="tab-g" aria-selected="true"
                    aria-controls="panel-g">西暦 → 和暦</button>
                <button type="button" class="convert-tab" role="tab" id="tab-w" aria-selected="false"
                    aria-controls="panel-w">和暦 → 西暦</button>
            </div>

            <div id="panel-g" class="convert-tabpanel" role="tabpanel" aria-labelledby="tab-g">
                <p class="convert-hint">西暦の日付を和暦に変換します。</p>
                <div class="convert-row convert-row--g">
                    <div class="convert-g-date-field">
                        <span class="convert-ymd-lbl convert-g-date-lbl" aria-hidden="true">年月日</span>
                        <input type="date" id="gDate" class="convert-date-input" aria-label="西暦の日付（年・月・日）">
                    </div>
                    <button type="button" class="btn-today" id="btnToday">今日</button>
                </div>
                <div id="outWareki" class="convert-result convert-result--with-copy" role="status" aria-live="off">
                </div>
            </div>

            <div id="panel-w" class="convert-tabpanel" role="tabpanel" aria-labelledby="tab-w" hidden>
                <p class="convert-hint">和暦の日付を西暦に変換します。元年は年に 1 を入力します。</p>
                <div class="convert-wareki-compact">
                    <div class="convert-ymd-row">
                        <label class="convert-ymd-item convert-ymd-item--era">
                            <span class="convert-ymd-lbl">元号</span>
                            <select id="wEra" class="convert-select convert-select--era" aria-label="元号"></select>
                        </label>
                        <label class="convert-ymd-item">
                            <span class="convert-ymd-lbl">年</span>
                            <input type="number" id="wYear" class="convert-num convert-num--sm" min="1" max="99"
                                inputmode="numeric" aria-label="和暦の年">
                        </label>
                        <label class="convert-ymd-item">
                            <span class="convert-ymd-lbl">月</span>
                            <input type="number" id="wMonth" class="convert-num convert-num--sm" min="1" max="12"
                                inputmode="numeric" aria-label="月">
                        </label>
                        <label class="convert-ymd-item">
                            <span class="convert-ymd-lbl">日</span>
                            <input type="number" id="wDay" class="convert-num convert-num--sm" min="1" max="31"
                                inputmode="numeric" aria-label="日">
                        </label>
                        <button type="button" class="btn-today" id="btnWarekiToday">今日</button>
                    </div>
                </div>
                <div id="outGregorian" class="convert-result convert-result--with-copy" role="status" aria-live="off">
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/tool-registry.js"></script>

</body>
