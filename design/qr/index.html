    <title>QRコード作成 無料ツール｜テキストや URL から QR を表示・PNG 保存</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="../../js/tool-theme-init.js"></script>
    <link rel="stylesheet" href="../../css/site.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CZZQCPMX5Z"></script>
    <script src="../../js/gtag-config.js"></script>

<body class="page-tool tool-page">

<header id="site-header" class="site-header--tool" data-header-partial="tool"></header>

<div class="tool-chrome" data-tool-id="qr">
    <div class="tool-panel qr-tool">
        <p class="convert-hint">URL・本文・連絡先などを入力すると QR コードを表示します。入力は自動で反映されます。</p>

        <div class="qr-preview" id="qrPreview">
            <canvas id="qrCanvas" class="qr-canvas" width="256" height="256" hidden></canvas>
        </div>

        <label class="qr-label" for="qrInput">内容</label>
        <textarea id="qrInput" class="qr-textarea" rows="5" placeholder="https:// やテキストを入力…" aria-label="QRコードにする内容">https://www.snap-tools.jp/</textarea>

        <div class="qr-options">
            <label class="qr-option">
                <span class="qr-option-lbl">サイズ（ピクセル）</span>
                <select id="qrSize" class="convert-select qr-select" aria-label="QRコードの表示サイズ">
                    <option value="200">200</option>
                    <option value="256" selected>256</option>
                    <option value="320">320</option>
                    <option value="400">400</option>
                </select>
            </label>
            <label class="qr-option">
                <span class="qr-option-lbl">誤り訂正</span>
                <select id="qrEc" class="convert-select qr-select" aria-label="誤り訂正レベル" title="高いほど汚れに強いがデータ量の上限が下がります">
                    <option value="L">低（約7%）</option>
                    <option value="M" selected>中（約15%）</option>
                    <option value="Q">高（約25%）</option>
                    <option value="H">最高（約30%）</option>
                </select>
            </label>
        </div>

        <p class="qr-error" id="qrError" hidden role="alert"></p>

        <button type="button" class="convert-submit-btn qr-download" id="qrDownload" disabled>PNGを保存</button>
    </div>
</div>

<script src="../../js/tool-registry.js"></script>
<script src="../../js/logo-mesh.js"></script>
<script src="../../js/partials-loader.js"></script>
<script src="../../js/tool-theme.js"></script>
<script src="../../js/copy-toast.js"></script>
<script src="../../js/tool-chrome.js"></script>
<script src="../../js/vendor/qrcode.browser.js"></script>
<script src="../../js/qr-page.js"></script>
</body>
</html>
