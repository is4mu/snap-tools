<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/tool-theme-init.js"></script>
    <link rel="stylesheet" href="css/site.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CZZQCPMX5Z"></script>
    <script src="js/gtag-config.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4645103012651649"
         crossorigin="anonymous"></script>
</head>
<body class="page-home">

<header id="site-header" class="site-header--home" data-header-partial="home"></header>

<section class="home-search-block" aria-label="ツール検索">
    <label class="home-search-label" for="home-tool-search">ツールを検索</label>
    <input type="search" id="home-tool-search" class="home-tool-search" placeholder="名前や説明のキーワードで絞り込み…" autocomplete="off" enterkeyhint="search" />
    <p id="home-search-hint" class="home-search-hint" role="status" aria-live="polite" hidden></p>
</section>

<section id="favorites-block" class="favorites-block" hidden>
    <h2 class="favorites-block-title">お気に入り</h2>
    <div class="tool-grid favorites-grid" id="favorites-grid"></div>
</section>

<main class="home-tool-main" id="home-tool-main" aria-label="ツール一覧（カテゴリ別）"></main>

<footer id="site-footer" class="site-footer" data-footer-partial="default"></footer>
<script src="js/tool-registry.js"></script>
<script src="js/logo-mesh.js"></script>
<script src="js/partials-loader.js"></script>
<script src="js/tool-theme.js"></script>
<script src="js/home-favorites.js"></script>
</body>
</html>
