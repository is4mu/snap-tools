<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード生成 | snap-tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/tool-theme-init.js"></script>
    <link rel="stylesheet" href="css/site.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CZZQCPMX5Z"></script>
    <script src="js/gtag-config.js"></script>
</head>
<body class="page-tool tool-page">

<header id="site-header" class="site-header--tool" data-header-partial="tool"></header>

<div class="tool-chrome" data-tool-id="generator">
    <div class="tool-panel convert-tool">
        <div class="convert-pass-generator-stack">
            <div id="passResultsList" class="convert-pass-results" aria-live="off"></div>

            <p id="passGenError" class="convert-pass-error" hidden role="alert"></p>

            <div class="convert-pass-generate-row">
                <button type="button" class="convert-submit-btn convert-submit-btn--pass-gen" id="passGenerateBtn">パスワードを生成する</button>
                <div class="convert-pass-batch convert-pass-batch--inline convert-pass-batch--select-only">
                    <select id="passBatchSize" class="convert-select convert-select--batch" aria-label="一度に生成する件数">
                        <option value="1">1</option>
                        <option value="3" selected>3</option>
                        <option value="5">5</option>
                        <option value="8">8</option>
                    </select>
                </div>
            </div>

            <p id="passEntropyBlock" class="convert-pass-entropy" aria-live="polite">
                <span class="convert-pass-entropy-row">
                    <span class="convert-pass-entropy-main">推定エントロピー（目安）: <strong id="passEntropyBits">—</strong> ビット</span>
                    <span id="passStrengthBadge" class="convert-pass-strength-badge convert-pass-strength-badge--mid" aria-label="強度の目安: 中">中</span>
                </span>
                <span id="passEntropyNote" class="convert-pass-entropy-note"></span>
            </p>
        </div>

        <div class="convert-tabs convert-pass-tabs" role="tablist" aria-label="生成の方式">
            <button type="button" class="convert-tab" role="tab" id="passTabRandom" aria-selected="true" aria-controls="passPanelRandom">ランダム文字列</button>
            <button type="button" class="convert-tab" role="tab" id="passTabPhrase" aria-selected="false" aria-controls="passPanelPhrase">パスフレーズ</button>
        </div>

        <div id="passPanelRandom" class="convert-tabpanel convert-pass-block" role="tabpanel" aria-labelledby="passTabRandom">
            <p class="convert-hint convert-pass-tab-hint">文字数と文字種からランダムな文字列を作ります。</p>
            <div class="convert-pass-strength">
                <div class="convert-pass-strength-head">
                    <span class="convert-ymd-lbl">文字数</span>
                </div>
                <div class="convert-pass-strength-inline">
                    <input type="range" id="passLengthSlider" class="convert-pass-slider convert-pass-slider--inline" min="8" max="32" value="16" aria-valuemin="8" aria-valuemax="32" aria-valuenow="16" aria-label="パスワードの文字数（スライダー）">
                    <input type="number" id="passLengthInput" class="convert-num convert-num--sm convert-num--pass" min="8" max="32" value="16" step="1" inputmode="numeric" aria-label="文字数（8〜32）">
                </div>
            </div>

            <fieldset class="convert-pass-fieldset convert-pass-fieldset--conditions">
                <legend class="convert-pass-fieldset-legend">条件</legend>
                <div class="convert-pass-conditions-row" role="group" aria-label="含める文字の種類">
                    <label class="convert-pass-option convert-pass-option--cond">
                        <input type="checkbox" id="passIncUpper" aria-label="大文字（A〜Z）を含める">
                        <span class="convert-pass-opt-short" aria-hidden="true">ABC</span>
                    </label>
                    <label class="convert-pass-option convert-pass-option--cond">
                        <input type="checkbox" id="passIncLower" checked aria-label="小文字（a〜z）を含める">
                        <span class="convert-pass-opt-short" aria-hidden="true">abc</span>
                    </label>
                    <label class="convert-pass-option convert-pass-option--cond">
                        <input type="checkbox" id="passIncNumbers" checked aria-label="数字（0〜9）を含める">
                        <span class="convert-pass-opt-short" aria-hidden="true">123</span>
                    </label>
                    <label class="convert-pass-option convert-pass-option--cond">
                        <input type="checkbox" id="passIncSymbols" aria-label="記号（-_@#.,!?*+$%&amp;）を含める">
                        <span class="convert-pass-opt-short" aria-hidden="true">#%!</span>
                    </label>
                </div>
            </fieldset>

            <fieldset class="convert-pass-fieldset">
                <legend class="convert-pass-fieldset-legend">オプション</legend>
                <label class="convert-pass-option convert-pass-option--block">
                    <input type="checkbox" id="passNoAmbiguous" checked>
                    <span>紛らわしい文字を使わない（O, 0, o, i, l, L, I, 1, |）</span>
                </label>
                <label class="convert-pass-option convert-pass-option--block">
                    <input type="checkbox" id="passEdgesLetter" checked>
                    <span>先頭と末尾を英字にする</span>
                </label>
                <label class="convert-pass-option convert-pass-option--block">
                    <input type="checkbox" id="passMustIncludeEnable">
                    <span>任意の単語を含む</span>
                </label>
                <div id="passMustIncludeWrap" class="convert-pass-option-field convert-pass-must-include-wrap" hidden>
                    <div class="convert-pass-custom convert-pass-custom--in-fieldset">
                        <input type="text" id="passMustInclude" class="convert-pass-custom-input" maxlength="64" placeholder="例: MySite（そのまま連続で含めます）" autocomplete="off" spellcheck="false" aria-label="任意でパスワードに含める文字列" aria-describedby="passMustIncludeHint" disabled>
                    </div>
                    <span id="passMustIncludeHint" class="convert-pass-field-hint">条件で使える文字のみ。パスワード内にそのまま現れます。</span>
                </div>
            </fieldset>

        </div>

        <div id="passPanelPhrase" class="convert-tabpanel convert-pass-block convert-pass-phrase-block" role="tabpanel" aria-labelledby="passTabPhrase" hidden>
            <p class="convert-hint convert-pass-tab-hint">英単語をランダムに選び、区切りでつなぎます。</p>
            <div class="convert-pass-strength">
                <div class="convert-pass-strength-head">
                    <span class="convert-ymd-lbl">単語数</span>
                </div>
                <div class="convert-pass-strength-inline">
                    <input type="range" id="passPhraseWordsSlider" class="convert-pass-slider convert-pass-slider--inline" min="3" max="10" value="5" aria-valuemin="3" aria-valuemax="10" aria-valuenow="5" aria-label="パスフレーズの単語数（スライダー）">
                    <input type="number" id="passPhraseWordsInput" class="convert-num convert-num--sm convert-num--pass" min="3" max="10" value="5" step="1" inputmode="numeric" aria-label="単語数（3〜10）">
                </div>
            </div>
            <fieldset class="convert-pass-fieldset convert-pass-fieldset--phrase-options">
                <legend class="convert-pass-fieldset-legend">オプション</legend>
                <div class="convert-pass-phrase-case">
                    <span class="convert-ymd-lbl" id="passPhraseCaseHeading">単語の表記</span>
                    <div class="convert-pass-phrase-case-row" role="radiogroup" aria-labelledby="passPhraseCaseHeading">
                        <label class="convert-pass-option convert-pass-option--cond">
                            <input type="radio" name="passPhraseCase" value="title" checked id="passPhraseCaseTitle" aria-label="Abc（先頭のみ大文字）">
                            <span class="convert-pass-opt-short" aria-hidden="true">Abc</span>
                        </label>
                        <label class="convert-pass-option convert-pass-option--cond">
                            <input type="radio" name="passPhraseCase" value="lower" id="passPhraseCaseLower" aria-label="abc（小文字）">
                            <span class="convert-pass-opt-short" aria-hidden="true">abc</span>
                        </label>
                        <label class="convert-pass-option convert-pass-option--cond">
                            <input type="radio" name="passPhraseCase" value="upper" id="passPhraseCaseUpper" aria-label="ABC（大文字）">
                            <span class="convert-pass-opt-short" aria-hidden="true">ABC</span>
                        </label>
                    </div>
                </div>
                <div class="convert-pass-phrase-sep">
                    <span class="convert-ymd-lbl" id="passPhraseSepHeading">単語の区切り</span>
                    <div class="convert-pass-phrase-sep-row">
                        <select id="passPhraseSep" class="convert-select convert-select--batch" aria-labelledby="passPhraseSepHeading">
                            <option value="-">ハイフン（-）</option>
                            <option value="_">アンダースコア（_）</option>
                            <option value=" ">スペース</option>
                            <option value="">なし（連結）</option>
                            <option value="__custom__">カスタム…</option>
                        </select>
                        <div id="passPhraseSepCustomWrap" class="convert-pass-phrase-sep-custom-wrap" hidden>
                            <input type="text" id="passPhraseSepCustom" class="convert-pass-custom-input convert-pass-phrase-sep-custom-input" maxlength="8" value="-" autocomplete="off" spellcheck="false" aria-label="カスタムの区切り文字列（最大8文字）" disabled>
                        </div>
                    </div>
                </div>
            </fieldset>
            <p class="convert-hint convert-pass-phrase-credit">単語は <a href="https://www.eff.org/dice" target="_blank" rel="noopener noreferrer">EFF Short Wordlist #1</a>（1296語・英語）から選びます。</p>
        </div>
    </div>
</div>

<script src="js/tool-registry.js"></script>
<script src="js/logo-mesh.js"></script>
<script src="js/partials-loader.js"></script>
<script src="js/tool-theme.js"></script>
<script src="js/copy-toast.js"></script>
<script src="js/tool-chrome.js"></script>
<script src="js/generator-wordlist.js"></script>
<script src="js/generator-page.js"></script>
</body>
</html>
